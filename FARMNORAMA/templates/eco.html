<!DOCTYPE html>
<html>
<head>
    <title>Eco-Monitoring</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h4>🌍 Eco-Monitoring Module</h4>
    <p class="text-muted">Simulated IoT Field Sensor Data</p>

    <div class="card p-4 shadow-sm">

        <div class="row g-3">

            <div class="col-6">
                <label>Soil Moisture (%)</label>
                <input type="number" class="form-control" value="65">
            </div>

            <div class="col-6">
                <label>Soil pH</label>
                <input type="number" class="form-control" value="6.5">
            </div>

            <div class="col-6">
                <label>Nitrogen (N)</label>
                <input type="number" class="form-control" value="80">
            </div>

            <div class="col-6">
                <label>Phosphorus (P)</label>
                <input type="number" class="form-control" value="45">
            </div>

            <div class="col-6">
                <label>Potassium (K)</label>
                <input type="number" class="form-control" value="70">
            </div>

        </div>

        <button class="btn btn-success w-100 mt-4">Update Data</button>

    </div>

</div>

</body>
</html>
