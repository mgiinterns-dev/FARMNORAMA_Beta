{% extends "layout.html" %}
{% block content %}

<img src="{{ url_for('static', filename='images/mgi.png') }}" class="mgi-top">

<div class="auth-box">

<h2 class="auth-title">WORK INFO</h2>
<p class="auth-sub">Tell us about your role</p>

<form action="/save_work" method="POST">

<select name="role" id="role" class="auth-select" required>
<option disabled selected>Select Role</option>
<option>Farmer</option>
<option>Manager</option>
<option>Agronomist</option>
<option>Technician</option>
<option value="Other">Other</option>
</select>

<input id="role_other" name="role_other" class="auth-input d-none" placeholder="Specify role">

<select name="function" id="function" class="auth-select" required>
<option disabled selected>Select Function</option>
<option>Monitoring</option>
<option>Operations</option>
<option>Analytics</option>
<option value="Other">Other</option>
</select>

<input id="function_other" name="function_other" class="auth-input d-none" placeholder="Specify function">

<select name="usage" id="usage" class="auth-select" required>
<option disabled selected>Select Usage</option>
<option>Tracking</option>
<option>Planning</option>
<option>Automation</option>
<option value="Other">Other</option>
</select>

<input id="usage_other" name="usage_other" class="auth-input d-none" placeholder="Specify usage">

<button class="auth-btn">Finish</button>

</form>

</div>

<script>
["role","function","usage"].forEach(id=>{
document.getElementById(id).addEventListener("change", function(){
let input=document.getElementById(id+"_other");
if(this.value==="Other"){
input.classList.remove("d-none");
}else{
input.classList.add("d-none");
}
});
});
</script>

{% endblock %}
