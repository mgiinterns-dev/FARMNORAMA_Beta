<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<title>Farmnorama</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- HEADER -->
<nav class="navbar navbar-dark custom-header">
<div class="container d-flex align-items-center">

<!-- LOGO (FIXED CLICK BEHAVIOR) -->
<a href="{{ '/dashboard' if session.get('email') else '/' }}" class="d-flex align-items-center text-decoration-none">
<img src="{{ url_for('static', filename='images/farmnorama.png') }}" class="nav-logo">
<span class="navbar-brand text-white ms-2">Farmnorama</span>
</a>

<div class="ms-auto">
{% if session.get("email") %}
<a href="/dashboard" class="nav-link d-inline text-white me-3">Dashboard</a>
<a href="/logout" class="nav-link d-inline text-white">Logout</a>
{% else %}
<a href="/" class="nav-link d-inline text-white me-3">Login</a>
<a href="/signup" class="nav-link d-inline text-white">Sign Up</a>
{% endif %}
</div>

</div>
</nav>

<div class="main-container">
{% block content %}{% endblock %}
</div>

<footer class="footer text-center">
<p>© 2026 Farmnorama | Powered by MGI International Ltd.</p>
</footer>

</body>
</html>
