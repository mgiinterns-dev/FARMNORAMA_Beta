{% extends "layout.html" %}
{% block content %}

<div class="auth-box">

<h2>My Profile</h2>

<form action="/update_profile" method="POST">

<input class="auth-input" name="fullname" value="{{ profile[2] if profile else '' }}" placeholder="Full Name">
<input class="auth-input" name="phone" value="{{ profile[3] if profile else '' }}" placeholder="Phone">
<input class="auth-input" name="address" value="{{ profile[4] if profile else '' }}" placeholder="Address">
<textarea class="auth-input" name="bio">{{ profile[5] if profile else '' }}</textarea>

<button class="auth-btn">Update Profile</button>

</form>

<hr>

<h4>Delete Account</h4>

<input id="confirmPass" type="password" class="auth-input" placeholder="Enter password">

<button class="delete-btn" onclick="deleteAccount()">Delete Account</button>

<p id="msg" class="error-text"></p>

</div>

<script>
function deleteAccount(){
let pass = document.getElementById("confirmPass").value;

fetch("/delete_account",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"password=" + encodeURIComponent(pass)
})
.then(res=>res.json())
.then(data=>{
if(data.status=="wrong_password"){
document.getElementById("msg").innerText="Incorrect password!";
}else if(data.status=="deleted"){
window.location="/";
}
});
}
</script>

{% endblock %}
