{% extends "layout.html" %}
{% block content %}

<div class="app-wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
<button class="create-btn" onclick="openModal()">+ Create</button>

<ul class="menu">
<li class="active">Home</li>
<li onclick="location.href='/profile'">Profile</li>
</ul>

<button class="dark-toggle" onclick="toggleDark()">🌙 Dark Mode</button>

<div class="stats">
<p>Total: <span id="total"></span></p>
<p>Done: <span id="doneCount"></span></p>
<div class="progress-bar"><div id="progressFill"></div></div>
</div>
</div>

<!-- MAIN -->
<div class="main-content">

<!-- TOPBAR -->
<div class="topbar">
<input class="search-bar" placeholder="Search tasks..." oninput="filterTasks(this.value)">

<select class="sort-dropdown" onchange="sortTasks(this.value)">
<option value="">Sort</option>
<option value="priority">Priority</option>
<option value="date">Due Date</option>
</select>
</div>

<!-- ANALYTICS -->
<div class="analytics">

<div class="card">
<h6>Completion Rate</h6>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h6>Smart Suggestions</h6>
<ul id="suggestions"></ul>
</div>

<div class="card">
<h6>Notifications</h6>
<ul id="notifications"></ul>
</div>

</div>

<!-- TASK BOARD -->
<div class="task-board">

<div class="task-column" id="todo" ondrop="drop(event,'To do')" ondragover="allowDrop(event)">
<h6>To do</h6>
</div>

<div class="task-column" id="doing" ondrop="drop(event,'Doing')" ondragover="allowDrop(event)">
<h6>Doing</h6>
</div>

<div class="task-column" id="done" ondrop="drop(event,'Done')" ondragover="allowDrop(event)">
<h6>Done</h6>
</div>

</div>

</div> <!-- END MAIN CONTENT -->
</div> <!-- END APP WRAPPER -->

<!-- MODAL -->
<div id="modal" class="modal d-none">
<div class="modal-box">
<input id="taskTitle" placeholder="Task name">
<select id="taskPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
<input id="taskDate" type="date">

<button onclick="saveTask()">Save</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<!-- TOAST -->
<div id="toast" class="toast d-none"></div>

<script>

let editId=null, dragId=null, allTasks=[];

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* DRAG */
function allowDrop(ev){ ev.preventDefault(); }
function drag(ev,id){ dragId=id; }

function drop(ev,status){
fetch("/update_task",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`id=${dragId}&status=${status}`
}).then(()=>loadTasks());
}

/* TOAST */
function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.remove("d-none");
setTimeout(()=>t.classList.add("d-none"),2000);
}

/* LOAD */
function loadTasks(){
fetch("/get_tasks")
.then(res=>res.json())
.then(data=>{
allTasks=data.tasks;
renderTasks(allTasks);
});
}

/* RENDER */
function renderTasks(tasks){

["todo","doing","done"].forEach(id=>{
document.getElementById(id).innerHTML="<h6>"+id.toUpperCase()+"</h6>";
});

let total=0, done=0;

tasks.forEach(t=>{
total++;
if(t[3]=="Done") done++;

let div=document.createElement("div");
div.className="task";
div.draggable=true;
div.ondragstart=(e)=>drag(e,t[0]);

div.innerHTML=`
<strong>${t[2]}</strong>
<small>${t[5]||""}</small>
<span>${t[4]}</span>
<button onclick="editTask(${t[0]},'${t[2]}','${t[4]}','${t[5]||""}')">✏️</button>
<button onclick="deleteTask(${t[0]})">🗑️</button>
`;

if(t[3]=="To do") document.getElementById("todo").appendChild(div);
if(t[3]=="Doing") document.getElementById("doing").appendChild(div);
if(t[3]=="Done") document.getElementById("done").appendChild(div);
});

/* STATS */
document.getElementById("total").innerText=total;
document.getElementById("doneCount").innerText=done;

let percent=total?(done/total)*100:0;
document.getElementById("progressFill").style.width=percent+"%";

/* ULTRA FEATURES (FIXED POSITION) */
renderChart(done,total);
generateSuggestions(tasks);
generateNotifications(tasks);
}

/* SAVE */
function saveTask(){
let t=taskTitle.value, p=taskPriority.value, d=taskDate.value;

if(editId){
fetch("/edit_task",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`id=${editId}&title=${t}&priority=${p}&due_date=${d}`});
showToast("Updated");
editId=null;
}else{
fetch("/add_task",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`title=${t}&priority=${p}&due_date=${d}`});
showToast("Added");
}

setTimeout(loadTasks,200);
closeModal();
}

function editTask(id,t,p,d){
editId=id;
taskTitle.value=t;
taskPriority.value=p;
taskDate.value=d;
openModal();
}

function deleteTask(id){
if(confirm("Delete task?")){
fetch("/delete_task",{method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"id="+id}).then(()=>{
showToast("Deleted");
loadTasks();
});
}
}

function filterTasks(q){
renderTasks(allTasks.filter(t=>t[2].toLowerCase().includes(q.toLowerCase())));
}

function openModal(){modal.classList.remove("d-none");}
function closeModal(){modal.classList.add("d-none");}

/* SORT (ONLY ONE VERSION) */
function sortTasks(type){
if(type=="priority"){
const order = {"High":3,"Medium":2,"Low":1};
allTasks.sort((a,b)=> order[b[4]] - order[a[4]]);
}

if(type=="date"){
allTasks.sort((a,b)=> new Date(a[5] || "2100-01-01") - new Date(b[5] || "2100-01-01"));
}

renderTasks(allTasks);
}

/* CHART */
function renderChart(done,total){
let ctx = document.getElementById("chart");
if(!ctx) return;

new Chart(ctx, {
type: 'doughnut',
data: {
labels: ['Done','Remaining'],
datasets: [{
data: [done, total-done]
}]
}
});
}

/* SUGGESTIONS */
function generateSuggestions(tasks){
let list = document.getElementById("suggestions");
list.innerHTML="";

tasks.forEach(t=>{
if(t[3]!="Done" && t[4]=="High"){
let li=document.createElement("li");
li.innerText="⚡ Focus on: "+t[2];
list.appendChild(li);
}
});
}

/* NOTIFICATIONS */
function generateNotifications(tasks){
let list=document.getElementById("notifications");
list.innerHTML="";

tasks.forEach(t=>{
if(t[5]){
let due=new Date(t[5]);
let today=new Date();

if(due < today && t[3]!="Done"){
let li=document.createElement("li");
li.innerText="⚠ Overdue: "+t[2];
list.appendChild(li);
}
}
});
}

loadTasks();

</script>

{% endblock %}
