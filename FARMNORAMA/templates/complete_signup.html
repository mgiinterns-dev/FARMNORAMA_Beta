<!DOCTYPE html>
<html>
<head>

<title>Complete Signup</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light d-flex align-items-center vh-100">

<div class="container">

<div class="card shadow p-4 mx-auto" style="max-width:400px">

<h4 class="text-center">Complete Registration</h4>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert alert-danger">{{messages[0]}}</div>
{% endif %}
{% endwith %}

<form method="POST" action="/register">

<input type="text" name="fullname" class="form-control mb-3" placeholder="Full Name" required>

<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

<input type="password" name="confirm" class="form-control mb-3" placeholder="Confirm Password" required>

<button class="btn btn-success w-100">Create Account</button>

</form>

</div>
</div>
</body>
</html>
