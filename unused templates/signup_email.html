<!DOCTYPE html>
<html>
<head>
<title>Farmnorama Signup</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light d-flex align-items-center vh-100">

<div class="container">

<div class="card shadow p-4 mx-auto" style="max-width:400px">

<h4 class="text-center mb-3">🌱 Farmnorama</h4>

<p class="text-center text-muted">Enter your email to begin</p>

<form method="POST" action="/send_code">

<input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>

<button class="btn btn-success w-100">Send Verification Code</button>

</form>

</div>
</div>
</body>
</html>
