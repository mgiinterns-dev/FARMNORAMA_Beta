{% extends "layout.html" %}
{% block content %}
<div class="danger-zone" style="padding: 20px; text-align: center; border: 1px solid #ff4d4d; border-radius: 10px; margin-top: 50px;">
    <h3 style="color: #d9534f;">Account Settings</h3>
    <p>Once you delete your account, there is no going back. Please be certain.</p>
    
    <!-- Changed to a standard button type to prevent form conflicts -->
    <button type="button" onclick="confirmDelete()" class="delete-btn">Delete My Account</button>
</div>

<script>
function confirmDelete() {
    if (confirm("Are you sure? All your tasks and profile data will be wiped forever.")) {
        // This sends a GET request to the server
        window.location.href = "/delete_account";
    }
}
</script>

<style>
    .delete-btn { background: #ff4d4d; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
    .delete-btn:hover { background: #cc0000; }
</style>
{% endblock %}
