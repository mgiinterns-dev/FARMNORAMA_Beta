{% extends "layout.html" %}
{% block content %}

<div class="auth-box">
    <h2>Reset Password</h2>
    <p>Enter OTP and your new password</p>

    {% if error %}
    <p class="error-text">{{ error }}</p>
    {% endif %}

    <form action="/reset_password_submit" method="POST">
        <input name="otp" class="auth-input" placeholder="OTP" required>

        <div class="password-wrap">
            <input id="new_password" name="password" type="password" class="auth-input" placeholder="New Password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('new_password', this)" aria-label="Toggle password visibility">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>

        <button class="auth-btn">Update Password</button>
    </form>
</div>

<script>
function togglePassword(id, btn){
    const input = document.getElementById(id);
    const icon = btn.querySelector("i");

    if(input.type === "password"){
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    }else{
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

{% endblock %}
