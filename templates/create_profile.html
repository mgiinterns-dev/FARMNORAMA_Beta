{% extends "layout.html" %}
{% block content %}

<div class="auth-box profile-box">
    <img src="{{ url_for('static', filename='images/farmnorama_logo.png') }}" class="big-logo" alt="Farmnorama Logo">

    <h2>Complete Profile</h2>
    <p class="sub-text">Fill in your details to continue</p>

    {% if error %}
    <p class="error-text">{{ error }}</p>
    {% endif %}

    <form action="/save_profile" method="POST" enctype="multipart/form-data">
        <input type="text" name="fullname" id="fullname" placeholder="Full Name" required>
        <input type="number" name="age" min="1" max="120" placeholder="Age" required>
        <input type="text" name="phone" class="phone-only" maxlength="15" placeholder="Phone" required>
        <input type="text" name="address" placeholder="Address" required>
        <input type="text" name="company" placeholder="Company / Organization">

        <select name="position" id="position" onchange="toggleOtherPosition()" required>
            <option value="">Select Position / Profession</option>
            <option>Farmer</option>
            <option>Agricultural Engineer</option>
            <option>Agronomist</option>
            <option>Farm Manager</option>
            <option>Livestock Handler</option>
            <option>Fisherman</option>
            <option>Supply Chain Manager</option>
            <option>Warehouse Staff</option>
            <option>Delivery Personnel</option>
            <option>Sales Representative</option>
            <option>Marketing Specialist</option>
            <option>Data Analyst</option>
            <option>Software Developer</option>
            <option>IT Support</option>
            <option>Project Manager</option>
            <option>Business Owner</option>
            <option>Entrepreneur</option>
            <option>Student</option>
            <option>Researcher</option>
            <option>Government Worker</option>
            <option>NGO Worker</option>
            <option>Teacher</option>
            <option>Consultant</option>
            <option>Other</option>
        </select>

        <input type="text" name="position_other" id="position_other" class="d-none" placeholder="Please specify profession">
        <input type="text" name="website" placeholder="Website">

        <select name="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
            <option>Prefer not to say</option>
        </select>

        <textarea name="bio" placeholder="Short Bio"></textarea>
        <button class="auth-btn">Finish</button>
    </form>
</div>

<script>
function toggleOtherPosition(){
    const select = document.getElementById("position");
    const other = document.getElementById("position_other");
    if(select.value === "Other"){
        other.classList.remove("d-none");
        other.required = true;
    }else{
        other.classList.add("d-none");
        other.required = false;
        other.value = "";
    }
}

document.querySelectorAll('.phone-only').forEach(function(input){
    input.addEventListener('input', function(){
        this.value = this.value.replace(/[^0-9+]/g, '');
    });
});

window.onload = function(){
    fetch("/get_email")
    .then(res => res.json())
    .then(data => {
        if(data.email){
            document.getElementById("fullname").value = data.email.split("@")[0];
        }
    })
    .catch(() => {});
}
</script>

{% endblock %}
