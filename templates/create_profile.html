{% extends "layout.html" %}
{% block content %}
<div class="auth-box profile-box premium-auth-box signup-flow-box">
    <img src="{{ url_for('static', filename='images/farmnorama_logo.png') }}" class="big-logo premium-big-logo" alt="Farmnorama Logo">

    <div class="steps">
        <span class="done">1</span>
        <span class="done">2</span>
        <span class="active">3</span>
    </div>

    <h2 class="welcome-text">Complete Profile</h2>
    <p class="sub-text">Step 3 of 3: Fill in your profile details</p>

    {% if error %}
    <p class="error-text">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/save_profile" enctype="multipart/form-data">
        <input name="fullname" id="fullname" placeholder="Full Name" required>
        <input name="age" type="number" min="1" max="120" placeholder="Age" required>
        <input name="phone" class="phone-only" maxlength="15" placeholder="Phone" required>
        <input name="address" placeholder="Address" required>

        <input name="company" placeholder="Company / Organization">

        <select name="position" id="position" onchange="toggleOtherPosition()" required>
            <option value="">Select Position / Profession</option>
            <option>Farmer</option>
            <option>Agricultural Engineer</option>
            <option>Agronomist</option>
            <option>Farm Manager</option>
            <option>Livestock Handler</option>
            <option>Fisherman</option>
            <option>Supply Chain Manager</option>
            <option>Warehouse Staff</option>
            <option>Delivery Personnel</option>
            <option>Sales Representative</option>
            <option>Marketing Specialist</option>
            <option>Data Analyst</option>
            <option>Software Developer</option>
            <option>IT Support</option>
            <option>Project Manager</option>
            <option>Business Owner</option>
            <option>Entrepreneur</option>
            <option>Student</option>
            <option>Researcher</option>
            <option>Government Worker</option>
            <option>NGO Worker</option>
            <option>Teacher</option>
            <option>Consultant</option>
            <option>Other</option>
        </select>

        <input name="position_other" id="position_other" class="d-none" placeholder="Please specify profession">

        <input name="website" placeholder="Website">

        <select name="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
            <option>Prefer not to say</option>
        </select>

        <input type="file" name="photo" accept="image/*">
        <textarea name="bio" placeholder="Bio (optional)"></textarea>

        <button class="auth-btn">Next Step</button>
    </form>
</div>

<script>
function toggleOtherPosition(){
    const select = document.getElementById("position");
    const other = document.getElementById("position_other");

    if(select.value === "Other"){
        other.classList.remove("d-none");
        other.required = true;
    }else{
        other.classList.add("d-none");
        other.required = false;
        other.value = "";
    }
}

document.querySelectorAll('.phone-only').forEach(function(input){
    input.addEventListener('input', function(){
        this.value = this.value.replace(/[^0-9+]/g, '');
    });
});

window.onload = function(){
    fetch("/get_email")
    .then(res => res.json())
    .then(data => {
        if(data.email){
            document.getElementById("fullname").value = data.email.split("@")[0];
        }
    })
    .catch(() => {});
}
</script>
{% endblock %}
