{% extends "layout.html" %}
{% block content %}
<div class="app-wrapper">
    <aside class="sidebar">
        <div>
            <button class="create-btn" onclick="openModal()">+ Create</button>
            <ul class="menu">
                <li class="active">Home</li>
                <li onclick="location.href='/profile'">Profile</li>
                <li onclick="location.href='/activity'">Activity</li>
                <li onclick="location.href='/security_settings'">Security</li>
            </ul>
            <button class="dark-toggle" onclick="toggleDark()">🌙 Dark Mode</button>
        </div>
        <div class="stats">
            <p>Total: <span id="total">0</span></p>
            <p>Done: <span id="doneCount">0</span></p>
            <div class="progress-bar"><div id="progressFill"></div></div>
        </div>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <input class="search-bar" type="text" placeholder="Search tasks..." oninput="filterTasks(this.value)">
            <select class="sort-dropdown" onchange="sortTasks(this.value)">
                <option value="">Sort</option>
                <option value="priority">Priority</option>
                <option value="date">Due Date</option>
            </select>
        </div>

        <section class="analytics">
            <div class="card"><h6>Completion Rate</h6><canvas id="chart"></canvas></div>
            <div class="card"><h6>Smart Suggestions</h6><ul id="suggestions"></ul></div>
            <div class="card"><h6>Notifications</h6><ul id="notifications"></ul></div>
        </section>

        <section class="task-board">
            <div class="task-column" id="todo" ondrop="drop(event, 'To do')" ondragover="allowDrop(event)"><h6>To do</h6></div>
            <div class="task-column" id="doing" ondrop="drop(event, 'Doing')" ondragover="allowDrop(event)"><h6>Doing</h6></div>
            <div class="task-column" id="done" ondrop="drop(event, 'Done')" ondragover="allowDrop(event)"><h6>Done</h6></div>
        </section>
    </main>
</div>

<div id="modal" class="modal d-none">
    <div class="modal-box">
        <input id="taskTitle" class="auth-input" type="text" placeholder="Task name">
        <select id="taskPriority" class="auth-select">
            <option>Low</option><option>Medium</option><option>High</option>
        </select>
        <input id="taskDate" class="auth-input" type="date">
        <button class="auth-btn" onclick="saveTask()">Save</button>
        <button class="delete-btn" type="button" onclick="closeModal()">Cancel</button>
    </div>
</div>

<div id="toast" class="toast d-none"></div>

<script>
let editId = null;
let dragId = null;
let allTasks = [];
let taskChart = null;

function applySavedTheme() {
    const saved = localStorage.getItem("farmnoramaDarkMode");
    if (saved === "on") document.body.classList.add("dark");
}
function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("farmnoramaDarkMode", document.body.classList.contains("dark") ? "on" : "off");
}
function allowDrop(ev) { ev.preventDefault(); }
function drag(ev, id) { dragId = id; }
function drop(ev, status) {
    ev.preventDefault();
    if (!dragId) return;
    fetch("/update_task", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `id=${encodeURIComponent(dragId)}&status=${encodeURIComponent(status)}`
    }).then(() => {
        dragId = null;
        applySavedTheme();
        loadTasks();
    });
}
function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.remove("d-none");
    setTimeout(() => toast.classList.add("d-none"), 2000);
}
function loadTasks() {
    fetch("/get_tasks").then(res => res.json()).then(data => {
        allTasks = data.tasks || [];
        renderTasks(allTasks);
    });
}
function renderTasks(tasks) {
    const todoCol = document.getElementById("todo");
    const doingCol = document.getElementById("doing");
    const doneCol = document.getElementById("done");
    todoCol.innerHTML = "<h6>To do</h6>";
    doingCol.innerHTML = "<h6>Doing</h6>";
    doneCol.innerHTML = "<h6>Done</h6>";
    let total = 0, done = 0;
    tasks.forEach(t => {
        total++;
        const taskId = t[0], title = t[2] || "", status = t[3] || "To do", priority = t[4] || "Low", dueDate = t[5] || "";
        if (status === "Done") done++;
        const div = document.createElement("div");
        div.className = "task";
        div.draggable = true;
        div.ondragstart = (e) => drag(e, taskId);
        div.innerHTML = `
            <strong>${escapeHtml(title)}</strong>
            <small>${escapeHtml(dueDate || 'No due date')}</small>
            <span>${escapeHtml(priority)}</span>
            <div>
                <button type="button" onclick="editTask(${taskId}, ${jsString(title)}, ${jsString(priority)}, ${jsString(dueDate)})">✏️</button>
                <button type="button" onclick="deleteTask(${taskId})">🗑️</button>
            </div>`;
        if (status === "To do") todoCol.appendChild(div);
        if (status === "Doing") doingCol.appendChild(div);
        if (status === "Done") doneCol.appendChild(div);
    });
    document.getElementById("total").textContent = total;
    document.getElementById("doneCount").textContent = done;
    document.getElementById("progressFill").style.width = (total ? (done / total) * 100 : 0) + "%";
    renderChart(done, total);
    generateSuggestions(tasks);
    generateNotifications(tasks);
}
function saveTask() {
    const title = document.getElementById("taskTitle").value.trim();
    const priority = document.getElementById("taskPriority").value;
    const dueDate = document.getElementById("taskDate").value;
    if (!title) { showToast("Task name is required"); return; }
    const endpoint = editId ? "/edit_task" : "/add_task";
    const body = editId
        ? `id=${encodeURIComponent(editId)}&title=${encodeURIComponent(title)}&priority=${encodeURIComponent(priority)}&due_date=${encodeURIComponent(dueDate)}`
        : `title=${encodeURIComponent(title)}&priority=${encodeURIComponent(priority)}&due_date=${encodeURIComponent(dueDate)}`;
    fetch(endpoint, { method:"POST", headers:{ "Content-Type":"application/x-www-form-urlencoded" }, body }).then(() => {
        showToast(editId ? "Updated" : "Added");
        editId = null; clearModal(); closeModal(); applySavedTheme(); loadTasks();
    });
}
function editTask(id, title, priority, dueDate) {
    editId = id;
    document.getElementById("taskTitle").value = title;
    document.getElementById("taskPriority").value = priority;
    document.getElementById("taskDate").value = dueDate;
    openModal();
}
function deleteTask(id) {
    if (!confirm("Delete task?")) return;
    fetch("/delete_task", { method:"POST", headers:{ "Content-Type":"application/x-www-form-urlencoded" }, body:"id=" + encodeURIComponent(id) }).then(() => {
        showToast("Deleted"); applySavedTheme(); loadTasks();
    });
}
function filterTasks(query) {
    const q = query.toLowerCase();
    renderTasks(allTasks.filter(t => (t[2] || "").toLowerCase().includes(q)));
}
function sortTasks(type) {
    if (type === "priority") {
        const order = { "High": 3, "Medium": 2, "Low": 1 };
        allTasks.sort((a, b) => (order[b[4]] || 0) - (order[a[4]] || 0));
    }
    if (type === "date") {
        allTasks.sort((a, b) => {
            const dateA = a[5] ? new Date(a[5]) : new Date("2100-01-01");
            const dateB = b[5] ? new Date(b[5]) : new Date("2100-01-01");
            return dateA - dateB;
        });
    }
    renderTasks(allTasks);
}
function renderChart(done, total) {
    const ctx = document.getElementById("chart");
    if (!ctx) return;
    if (taskChart) taskChart.destroy();
    taskChart = new Chart(ctx, {
        type: "doughnut",
        data: { labels: ["Done", "Remaining"], datasets: [{ data: [done, Math.max(total - done, 0)] }]},
        options: { responsive: true, maintainAspectRatio: false }
    });
}
function generateSuggestions(tasks) {
    const list = document.getElementById("suggestions");
    list.innerHTML = "";
    let count = 0;
    tasks.forEach(t => {
        if (t[3] !== "Done" && t[4] === "High" && count < 5) {
            const li = document.createElement("li");
            li.textContent = "⚡ Focus on: " + (t[2] || "");
            list.appendChild(li); count++;
        }
    });
    if (count === 0) { const li = document.createElement("li"); li.textContent = "No urgent suggestions right now."; list.appendChild(li); }
}
function generateNotifications(tasks) {
    const list = document.getElementById("notifications");
    list.innerHTML = "";
    let count = 0;
    const today = new Date(); today.setHours(0,0,0,0);
    tasks.forEach(t => {
        if (t[5] && t[3] !== "Done" && count < 5) {
            const due = new Date(t[5]); due.setHours(0,0,0,0);
            if (due < today) {
                const li = document.createElement("li");
                li.textContent = "⚠ Overdue: " + (t[2] || "");
                list.appendChild(li); count++;
            }
        }
    });
    if (count === 0) { const li = document.createElement("li"); li.textContent = "No overdue notifications."; list.appendChild(li); }
}
function openModal() { document.getElementById("modal").classList.remove("d-none"); }
function closeModal() { document.getElementById("modal").classList.add("d-none"); }
function clearModal() {
    document.getElementById("taskTitle").value = "";
    document.getElementById("taskPriority").value = "Low";
    document.getElementById("taskDate").value = "";
}
function escapeHtml(value) {
    return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function jsString(value) { return JSON.stringify(String(value ?? "")); }

applySavedTheme();
loadTasks();
</script>
{% endblock %}
