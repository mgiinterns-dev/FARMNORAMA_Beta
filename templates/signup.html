{% extends "layout.html" %}
{% block content %}

<div class="auth-box">
    <img src="{{ url_for('static', filename='images/farmnorama_logo.png') }}" class="big-logo" alt="Farmnorama Logo">

    <h2>Create Account</h2>
    <p class="sub-text">Enter your details to continue</p>

    {% if error == "exists" %}
    <p class="error-text">Email already exists.</p>
    {% elif error == "invalid" %}
    <p class="error-text">Invalid email or password.</p>
    {% elif error %}
    <p class="error-text">{{ error }}</p>
    {% endif %}

    <form action="/create_account" method="POST">
        <input type="email" name="email" placeholder="Email" required>

        <div class="password-wrapper">
            <input type="password" name="password" id="signup_password" placeholder="Password" minlength="8" required>
            <button type="button" class="toggle-eye-btn" onclick="toggleSignupPassword()" aria-label="Toggle password visibility">
                <i class="fa-solid fa-eye signup-toggle-eye"></i>
            </button>
        </div>

        <button class="auth-btn">Sign Up</button>
    </form>
</div>

<script>
function toggleSignupPassword(){
    const p = document.getElementById("signup_password");
    const icon = document.querySelector(".signup-toggle-eye");
    if (p.type === "password") {
        p.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        p.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

{% endblock %}
