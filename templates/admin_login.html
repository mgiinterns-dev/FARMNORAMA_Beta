{% extends "layout.html" %}
{% block content %}
<div class="auth-panel auth-panel-wide admin-auth-panel">
    <div class="brand-stack">
        <img src="{{ url_for('static', filename='images/farmnorama.png') }}" class="auth-logo auth-logo-large" alt="Farmnorama Logo" onerror="this.style.display='none'">
        <h2 class="panel-title">Admin Login</h2>
        <p class="sub-text">Authorized personnel only</p>
    </div>

    {% if error %}<p class="error-text">{{ error }}</p>{% endif %}

    <form method="POST" action="/admin/login" class="auth-form-grid">
        <div class="input-group">
            <label>Admin Email</label>
            <input class="auth-input" type="email" name="email" placeholder="Enter admin email" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <div class="password-wrap">
                <input id="admin_password" class="auth-input" type="password" name="password" placeholder="Enter password" required>
                <button type="button" class="toggle-password" onclick="togglePassword('admin_password', this)"><i class="fa-solid fa-eye"></i></button>
            </div>
        </div>
        <button class="auth-btn" type="submit">Login as Admin</button>
    </form>
</div>
<script>
function togglePassword(id, btn){
    const input=document.getElementById(id); const icon=btn.querySelector('i');
    if(input.type==='password'){input.type='text'; icon.classList.replace('fa-eye','fa-eye-slash');}
    else{input.type='password'; icon.classList.replace('fa-eye-slash','fa-eye');}
}
</script>
{% endblock %}
