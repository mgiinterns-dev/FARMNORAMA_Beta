{% extends "layout.html" %}
{% block content %}

<div class="auth-box">
    <h2>Admin Login</h2>
    <p class="sub-text">Authorized personnel only</p>

    <form method="POST" action="/admin/login">
        <input class="auth-input" name="email" placeholder="Admin Email" required>
        <input class="auth-input" type="password" name="password" placeholder="Password" required>

        <button class="auth-btn">Login as Admin</button>
    </form>

    {% if error %}
    <p class="error-text">{{ error }}</p>
    {% endif %}
</div>

{% endblock %}
