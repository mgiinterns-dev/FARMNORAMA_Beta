{% extends "layout.html" %}
{% block content %}

<div class="auth-box">
<h2>RESET PASSWORD</h2>
<p>Enter your email</p>

<form action="/forgot_password" method="POST">
<input name="email" class="auth-input" placeholder="Email" required>
<button class="auth-btn">Send OTP</button>
</form>

{% if message %}
<p class="error-text">{{ message }}</p>
{% endif %}
</div>

{% endblock %}
