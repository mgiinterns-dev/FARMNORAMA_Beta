{% extends "layout.html" %}
{% block content %}

<div class="auth-box premium-auth-box">
    <img src="{{ url_for('static', filename='images/farmnorama_logo.png') }}" class="big-logo premium-big-logo" alt="Farmnorama Logo">

    <h2>Welcome</h2>
    <p class="sub-text">Sign in to continue</p>

    {% if error %}
    <p class="error-text">{{ error }}</p>
    {% endif %}

    <form action="/login_user" method="POST">
        <input type="email" name="email" placeholder="Email" required>

        <div class="password-wrapper">
            <input type="password" name="password" id="password" placeholder="Password" minlength="8" required>
            <button type="button" class="toggle-eye-btn" onclick="togglePassword()" aria-label="Toggle password visibility">
                <i class="fa-solid fa-eye toggle-eye"></i>
            </button>
        </div>

        <button class="auth-btn premium-auth-btn">Login</button>
    </form>

    <a class="forgot-link" href="/forgot">Forgot Password?</a>
</div>

<script>
function togglePassword(){
    const p = document.getElementById("password");
    const icon = document.querySelector(".toggle-eye");
    if (p.type === "password") {
        p.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        p.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

{% endblock %}
